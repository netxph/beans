<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4f8f66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kids Arcade" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./images/icon.svg" type="image/svg+xml" />
    <title>Beans Kids Arcade</title>
    <style>
      :root {
        --text: #1f3328;
        --muted: #496556;
        --card-glass: rgba(243, 252, 245, 0.86);
        --app-vh: 100dvh;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: var(--app-vh);
        min-height: var(--app-vh);
        overflow: hidden;
        font-family: "Nunito", "Inter", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: #7bb48b url("./images/jungle.png") center top / cover no-repeat fixed;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: linear-gradient(180deg, rgba(28, 66, 45, 0.24), rgba(28, 66, 45, 0.12) 28%, rgba(242, 251, 245, 0.12) 62%, rgba(242, 251, 245, 0.2));
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(120% 70% at 50% -10%, rgba(255,255,255,.28), rgba(255,255,255,0) 64%);
      }

      #app {
        width: 100%;
        height: var(--app-vh);
        min-height: var(--app-vh);
        position: relative;
        z-index: 1;
        overflow: hidden;
      }

      .home {
        position: relative;
        height: var(--app-vh);
        min-height: var(--app-vh);
        overflow-y: auto;
        overflow-x: hidden;
        padding: max(1rem, env(safe-area-inset-top)) 1rem calc(1rem + env(safe-area-inset-bottom));
        max-width: 980px;
        margin: 0 auto;
      }

      .hero,
      .games-grid {
        position: relative;
        z-index: 2;
      }

      .jungle-art {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }

      .jungle-art .a {
        position: absolute;
        font-size: clamp(1.3rem, 3vw, 2.1rem);
        opacity: .23;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
      }

      .jungle-art .a1 { left: 8px; top: 104px; }
      .jungle-art .a2 { right: 10px; top: 120px; }
      .jungle-art .a3 { left: 14px; bottom: 18px; }
      .jungle-art .a4 { right: 20px; bottom: 44px; }
      .jungle-art .a5 { left: 48%; top: 48px; }

      .home::before,
      .home::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .home::before {
        left: -28px;
        bottom: 54px;
        width: 210px;
        height: 64px;
        border-radius: 80px;
        background: linear-gradient(180deg, #8e5b43, #704532);
        transform: rotate(-16deg);
        box-shadow: 0 10px 20px rgba(0,0,0,.12);
        z-index: 0;
        opacity: .42;
      }

      .home::after {
        right: -56px;
        top: 34px;
        width: 240px;
        height: 72px;
        border-radius: 80px;
        background: linear-gradient(180deg, #8e5b43, #704532);
        transform: rotate(18deg);
        box-shadow: 0 10px 20px rgba(0,0,0,.1);
        z-index: 0;
        opacity: .4;
      }

      .hero {
        position: relative;
        background: var(--card-glass);
        border: 2px solid rgba(226, 243, 231, .9);
        border-radius: 26px;
        padding: 1rem 1.05rem;
        box-shadow: 0 14px 24px rgba(20, 52, 35, 0.2);
        backdrop-filter: blur(3px);
        overflow: hidden;
      }

      .hero::before {
        content: "🦜 🐒 🌿";
        position: absolute;
        right: 10px;
        top: 10px;
        font-size: 1.15rem;
        opacity: .22;
        pointer-events: none;
      }

      .hero > * {
        position: relative;
        z-index: 1;
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .5rem;
        margin: 0 0 .4rem;
        padding: 0 .1rem;
        position: relative;
        z-index: 2;
      }

      .hero-mini {
        font-size: .74rem;
        font-weight: 700;
        color: #ecfff2;
        letter-spacing: .01em;
        text-shadow: 0 1px 2px rgba(21, 53, 36, 0.45);
      }

      .github-link {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: #2a493a;
        background: rgba(255,255,255,.72);
        border: 1px solid rgba(176, 211, 185, .95);
        text-decoration: none;
      }

      .github-link svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1rem, 2.4vw, 1.18rem);
        line-height: 1.2;
        letter-spacing: 0;
        font-weight: 800;
      }

      .games-grid {
        margin-top: .9rem;
        display: grid;
        gap: 1rem .72rem;
        justify-content: start;
        grid-template-columns: repeat(auto-fill, minmax(102px, 1fr));
      }

      .game-card {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: .45rem;
        border: 0;
        background: transparent;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: transform .15s ease;
      }

      .game-icon-box {
        width: min(100%, 96px);
        aspect-ratio: 1 / 1;
        border-radius: 24px;
        border: 2px solid rgba(255,255,255,.82);
        box-shadow: 0 10px 18px rgba(27, 61, 89, 0.18), inset 0 1px 0 rgba(255,255,255,.55);
        position: relative;
        overflow: hidden;
        transition: transform .15s ease, box-shadow .15s ease;
      }

      .game-icon-box::before {
        content: "";
        position: absolute;
        left: 9px;
        right: 9px;
        top: 7px;
        height: 30%;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0));
        pointer-events: none;
      }

      .game-icon-box::after {
        content: "";
        position: absolute;
        right: -20px;
        bottom: -20px;
        width: 84px;
        height: 84px;
        border-radius: 999px;
        background: rgba(255,255,255,.2);
        z-index: 0;
      }

      .game-icon-box > * {
        position: relative;
        z-index: 1;
      }

      .game-card.c1 .game-icon-box { background: linear-gradient(180deg, #9be2b6, #7ecd9c); }
      .game-card.c2 .game-icon-box { background: linear-gradient(180deg, #f7d48a, #edbf64); }
      .game-card.c3 .game-icon-box { background: linear-gradient(180deg, #9fd9d0, #7ec3b8); }
      .game-card.c4 .game-icon-box { background: linear-gradient(180deg, #e5c78f, #d6ad6d); }

      .game-card:hover .game-icon-box {
        transform: translateY(-2px);
        box-shadow: 0 14px 24px rgba(27, 61, 89, 0.22), inset 0 1px 0 rgba(255,255,255,.55);
      }

      .game-card:active .game-icon-box {
        transform: scale(.96);
        box-shadow: 0 7px 12px rgba(27, 61, 89, 0.2), inset 0 1px 0 rgba(255,255,255,.45);
      }

      .game-card.tap-pop .game-icon-box {
        animation: tapPop .22s ease;
      }

      @keyframes tapPop {
        0% { transform: scale(1); }
        45% { transform: scale(.94); }
        100% { transform: scale(1); }
      }

      .game-emoji {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        display: grid;
        place-items: center;
        font-size: 2.6rem;
        overflow: hidden;
      }

      .game-emoji svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .game-title {
        margin: 0;
        text-align: center;
        font-size: .82rem;
        font-weight: 800;
        line-height: 1.15;
        color: #ffffff;
        background: rgba(18, 50, 36, .62);
        border: 1px solid rgba(255,255,255,.26);
        border-radius: 999px;
        padding: .22rem .52rem;
        text-shadow: 0 1px 2px rgba(0,0,0,.5);
        box-shadow: 0 4px 10px rgba(0,0,0,.16);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }

      .game-card:focus-visible {
        outline: none;
      }

      .game-card:focus-visible .game-icon-box {
        outline: 3px solid rgba(255,255,255,.95);
        outline-offset: 2px;
      }

      @media (max-width: 480px) {
        .games-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: .75rem .45rem;
        }

        .game-icon-box {
          width: min(100%, 72px);
          border-radius: 18px;
        }

        .game-emoji {
          font-size: 2rem;
        }

        .game-title {
          font-size: .72rem;
          padding: .18rem .4rem;
        }
      }

      .player {
        position: fixed;
        inset: 0;
        width: 100%;
        height: var(--app-vh);
        min-height: var(--app-vh);
        background: #0b1020;
        display: none;
        flex-direction: column;
        z-index: 20;
      }

      .player.show { display: flex; }

      .top-trigger {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 10px;
        z-index: 35;
      }

      .player-top {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: .6rem;
        padding: max(.6rem, env(safe-area-inset-top)) .7rem .6rem;
        background: #111827;
        color: #e5e7eb;
        border-bottom: 1px solid rgba(255,255,255,.14);
        transform: translateY(-110%);
        opacity: 0;
        pointer-events: none;
        transition: transform .18s ease, opacity .18s ease;
      }

      .player.nav-visible .player-top {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .ghost-btn {
        border: 1px solid rgba(255,255,255,.25);
        background: #1f2937;
        color: #fff;
        border-radius: 10px;
        padding: .45rem .65rem;
        font-weight: 700;
        cursor: pointer;
      }

      .player-title {
        margin-left: auto;
        font-size: .95rem;
        opacity: .9;
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      .empty {
        background: #fff;
        border-radius: 16px;
        padding: 1rem;
        color: #334155;
        border: 1px dashed #cbd5e1;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <main id="home" class="home">
        <div class="jungle-art" aria-hidden="true">
          <span class="a a1">🦜</span>
          <span class="a a2">🐒</span>
          <span class="a a3">🦥</span>
          <span class="a a4">🦋</span>
          <span class="a a5">🌴</span>
        </div>

        <div class="hero-top">
          <small class="hero-mini">🦁 Beans Kids Arcade</small>
          <a class="github-link" href="https://github.com/netxph/beans" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </div>

        <section class="hero">
          <h1>Hi 👋 Pick a game</h1>
        </section>

        <section id="gamesGrid" class="games-grid"></section>
      </main>

      <section id="player" class="player" aria-label="Game player">
        <div id="topTrigger" class="top-trigger" aria-hidden="true"></div>
        <div id="playerTop" class="player-top">
          <button id="backBtn" class="ghost-btn" type="button">← Back to Games</button>
          <button id="fsBtn" class="ghost-btn" type="button">Fullscreen</button>
          <div id="playerTitle" class="player-title"></div>
        </div>
        <iframe id="gameFrame" tabindex="0" allow="fullscreen; autoplay"></iframe>
      </section>
    </div>

    <script>
      function setDynamicVh() {
        document.documentElement.style.setProperty('--app-vh', `${window.innerHeight}px`);
      }

      function debounce(fn, wait = 120) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), wait);
        };
      }

      const setDynamicVhDebounced = debounce(setDynamicVh, 120);
      setDynamicVh();
      window.addEventListener('resize', setDynamicVhDebounced);
      window.addEventListener('orientationchange', setDynamicVhDebounced);

      const MULY_BEAR_ICON = `
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="28" cy="28" r="14" fill="#7C3AED" />
          <circle cx="28" cy="28" r="8" fill="#F472B6" />
          <circle cx="72" cy="28" r="14" fill="#7C3AED" />
          <circle cx="72" cy="28" r="8" fill="#F472B6" />
          <circle cx="50" cy="55" r="34" fill="#8B5CF6" />
          <circle cx="38" cy="48" r="5" fill="#1E1B4B" />
          <circle cx="62" cy="48" r="5" fill="#1E1B4B" />
          <circle cx="40" cy="46" r="1.5" fill="#FFFFFF" />
          <circle cx="64" cy="46" r="1.5" fill="#FFFFFF" />
          <circle cx="30" cy="58" r="4.5" fill="#F472B6" opacity="0.8" />
          <circle cx="70" cy="58" r="4.5" fill="#F472B6" opacity="0.8" />
          <ellipse cx="50" cy="62" rx="14" ry="10" fill="#E0E7FF" />
          <polygon points="50,58 45,54 55,54" fill="#1E1B4B" />
          <path d="M 44,62 Q 50,68 56,62" stroke="#1E1B4B" stroke-width="2.5" stroke-linecap="round" fill="none" />
          <polygon points="50,15 75,22 50,29 25,22" fill="#38BDF8" />
          <polygon points="40,26 40,36 60,36 60,26" fill="#0284C7" />
          <line x1="75" y1="22" x2="75" y2="34" stroke="#FBBF24" stroke-width="2" />
          <circle cx="75" cy="34" r="3" fill="#FBBF24" />
        </svg>
      `;

      const CROAKY_FROG_ICON = `
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <ellipse cx="27" cy="76" rx="12" ry="7" fill="#047857" />
          <ellipse cx="73" cy="76" rx="12" ry="7" fill="#047857" />

          <circle cx="50" cy="57" r="28" fill="#10b981" />
          <ellipse cx="50" cy="63" rx="17" ry="13" fill="#fef08a" />

          <circle cx="34" cy="35" r="12" fill="#10b981" />
          <circle cx="66" cy="35" r="12" fill="#10b981" />

          <circle cx="34" cy="35" r="7" fill="#ffffff" />
          <circle cx="66" cy="35" r="7" fill="#ffffff" />

          <circle cx="34" cy="35" r="3.5" fill="#000000" />
          <circle cx="66" cy="35" r="3.5" fill="#000000" />

          <circle cx="38" cy="57" r="3" fill="#f43f5e" opacity="0.8" />
          <circle cx="62" cy="57" r="3" fill="#f43f5e" opacity="0.8" />

          <path d="M 38 63 Q 50 73 62 63" stroke="#047857" stroke-width="3.5" fill="none" stroke-linecap="round" />
        </svg>
      `;

      const INSPECTOR_GECKO_ICON = `
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="34" fill="#22c55e" stroke="#15803d" stroke-width="3" />

          <circle cx="35" cy="44" r="9" fill="#ffffff" stroke="#15803d" stroke-width="2.5" />
          <circle cx="65" cy="44" r="9" fill="#ffffff" stroke="#15803d" stroke-width="2.5" />
          <circle cx="37" cy="44" r="4" fill="#ca8a04" />
          <circle cx="63" cy="44" r="4" fill="#ca8a04" />
          <circle cx="36" cy="42.5" r="1.3" fill="#ffffff" />
          <circle cx="62" cy="42.5" r="1.3" fill="#ffffff" />

          <path d="M 42 60 Q 50 67 58 60" stroke="#15803d" stroke-width="3" stroke-linecap="round" fill="none" />

          <path d="M 22 31 Q 50 10 78 31" fill="#a16207" stroke="#713f12" stroke-width="3" />
          <ellipse cx="50" cy="31" rx="29" ry="5" fill="#a16207" stroke="#713f12" stroke-width="2" />
          <rect x="28" y="27" width="44" height="5" fill="#ca8a04" />
        </svg>
      `;

      const GATOR_ICON = `
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <!-- Skull / top of head -->
          <ellipse cx="50" cy="28" rx="40" ry="18" fill="#1e9234"/>
          <!-- Left eye socket bump -->
          <ellipse cx="28" cy="20" rx="14" ry="10" fill="#166424"/>
          <!-- Left iris -->
          <circle cx="28" cy="19" r="8" fill="#f0e040"/>
          <!-- Left vertical slit pupil -->
          <ellipse cx="29" cy="19" rx="3" ry="7" fill="#0a0a0a"/>
          <circle cx="32" cy="15" r="2" fill="#fff"/>
          <!-- Right eye socket bump -->
          <ellipse cx="72" cy="20" rx="14" ry="10" fill="#166424"/>
          <!-- Right iris -->
          <circle cx="72" cy="19" r="8" fill="#f0e040"/>
          <!-- Right vertical slit pupil -->
          <ellipse cx="73" cy="19" rx="3" ry="7" fill="#0a0a0a"/>
          <circle cx="76" cy="15" r="2" fill="#fff"/>
          <!-- Main head body -->
          <rect x="14" y="28" width="72" height="38" rx="6" fill="#1e9234"/>
          <!-- Snout (lower center, slightly darker) -->
          <ellipse cx="50" cy="58" rx="26" ry="14" fill="#187a2a"/>
          <!-- Nostrils -->
          <circle cx="41" cy="52" r="4" fill="#0e5018"/>
          <circle cx="59" cy="52" r="4" fill="#0e5018"/>
          <!-- Scale bumps on head -->
          <circle cx="50" cy="38" r="3" fill="#166424" opacity="0.8"/>
          <circle cx="36" cy="40" r="2.5" fill="#166424" opacity="0.7"/>
          <circle cx="64" cy="40" r="2.5" fill="#166424" opacity="0.7"/>
          <!-- Upper teeth row -->
          <rect x="24" y="65" width="52" height="4" rx="2" fill="#145018"/>
          <path d="M28,65 L31,75 L34,65" fill="#f5f0d8"/>
          <path d="M40,65 L43,75 L46,65" fill="#f5f0d8"/>
          <path d="M54,65 L57,75 L60,65" fill="#f5f0d8"/>
          <path d="M66,65 L69,75 L72,65" fill="#f5f0d8"/>
          <!-- Lower teeth (poke up between upper teeth) -->
          <path d="M34,65 L37,56 L40,65" fill="#e8e4c8"/>
          <path d="M46,65 L49,56 L52,65" fill="#e8e4c8"/>
          <path d="M60,65 L63,56 L66,65" fill="#e8e4c8"/>
        </svg>
      `;

      const games = [
        {
          id: 'gator-bites',
          title: 'Gator Bites',
          icon: GATOR_ICON,
          emoji: '🐊',
          description: 'Read piano notes on the music staff and feed hungry Gator before the food floats past!',
          src: './gator-bites/index.html'
        },
        {
          id: 'flies-invasion',
          title: 'Flies Invasion',
          icon: CROAKY_FROG_ICON,
          emoji: '🐸',
          description: 'Protect the jungle by solving multiplication and splatting invading flies!',
          src: './flies-invasion/index.html'
        },
        {
          id: 'mully',
          title: 'Mully',
          icon: MULY_BEAR_ICON,
          description: 'Practice multiplication with fun puzzles and colorful feedback!',
          src: './mully/index.html'
        },
        {
          id: 'inspector-gecko',
          title: 'Inspector Gecko',
          icon: INSPECTOR_GECKO_ICON,
          emoji: '🦎',
          description: 'Solve mystery clues and learn fun facts from Wikipedia!',
          src: './inspector-gecko/index.html'
        }
      ];

      const home = document.getElementById('home');
      const grid = document.getElementById('gamesGrid');
      const player = document.getElementById('player');
      const frame = document.getElementById('gameFrame');
      const backBtn = document.getElementById('backBtn');
      const fsBtn = document.getElementById('fsBtn');
      const playerTitle = document.getElementById('playerTitle');
      const topTrigger = document.getElementById('topTrigger');
      const playerTop = document.getElementById('playerTop');

      let navHideTimer;

      function renderGames() {
        if (!games.length) {
          grid.innerHTML = '<div class="empty">No games yet. Add one in the <code>games</code> array in <code>index.html</code>.</div>';
          return;
        }

        grid.innerHTML = games.map((g, i) => `
          <article class="game-card c${(i % 4) + 1}" data-game-id="${g.id}" role="button" tabindex="0" aria-label="Play ${g.title}">
            <div class="game-icon-box">
              <div class="game-emoji">${g.icon || g.emoji || '🕹️'}</div>
            </div>
            <h2 class="game-title">${g.title}</h2>
          </article>
        `).join('');

        grid.querySelectorAll('.game-card').forEach(card => {
          card.addEventListener('click', () => {
            card.classList.add('tap-pop');
            setTimeout(() => openGame(card.dataset.gameId), 90);
            setTimeout(() => card.classList.remove('tap-pop'), 220);
          });

          card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              card.classList.add('tap-pop');
              setTimeout(() => openGame(card.dataset.gameId), 90);
              setTimeout(() => card.classList.remove('tap-pop'), 220);
            }
          });
        });
      }

      function showNav(ms = 2200) {
        clearTimeout(navHideTimer);
        player.classList.add('nav-visible');
        navHideTimer = setTimeout(() => {
          player.classList.remove('nav-visible');
        }, ms);
      }

      function hideNavSoon(ms = 180) {
        clearTimeout(navHideTimer);
        navHideTimer = setTimeout(() => {
          player.classList.remove('nav-visible');
        }, ms);
      }

      function openGame(id) {
        const game = games.find(g => g.id === id);
        if (!game) return;

        frame.src = game.src;
        playerTitle.textContent = `${game.emoji || '🎮'} ${game.title}`;
        player.classList.add('show');
        document.getElementById('app').classList.add('in-game');
        home.style.display = 'none';
        history.replaceState(null, '', `?game=${encodeURIComponent(game.id)}`);
        showNav(1200);

        const focusFrame = () => {
          try {
            frame.focus();
            frame.contentWindow?.focus?.();
          } catch {}
        };

        frame.addEventListener('load', focusFrame, { once: true });
        setTimeout(focusFrame, 120);
      }

      function closeGame() {
        clearTimeout(navHideTimer);
        player.classList.remove('show');
        player.classList.remove('nav-visible');
        document.getElementById('app').classList.remove('in-game');
        home.style.display = '';
        frame.src = 'about:blank';
        history.replaceState(null, '', './');
      }

      async function toggleFullscreen() {
        const root = document.documentElement;
        if (!document.fullscreenElement) await root.requestFullscreen?.();
        else await document.exitFullscreen?.();
      }

      function initFromUrl() {
        const byQuery = new URLSearchParams(location.search).get('game');
        if (byQuery) openGame(byQuery);
      }

      backBtn.addEventListener('click', closeGame);
      fsBtn.addEventListener('click', () => {
        toggleFullscreen();
        showNav(1200);
      });

      topTrigger.addEventListener('mouseenter', () => showNav());
      topTrigger.addEventListener('mousemove', () => showNav());
      topTrigger.addEventListener('mouseleave', () => hideNavSoon());
      topTrigger.addEventListener('touchstart', () => showNav(), { passive: true });
      topTrigger.addEventListener('touchend', () => hideNavSoon(120), { passive: true });
      topTrigger.addEventListener('touchcancel', () => hideNavSoon(120), { passive: true });

      playerTop.addEventListener('mouseenter', () => showNav());
      playerTop.addEventListener('mousemove', () => showNav());
      playerTop.addEventListener('mouseleave', () => hideNavSoon());
      playerTop.addEventListener('touchstart', () => showNav(), { passive: true });
      playerTop.addEventListener('touchend', () => hideNavSoon(120), { passive: true });
      playerTop.addEventListener('touchcancel', () => hideNavSoon(120), { passive: true });

      // Forward desktop keyboard input to iframe game even when iframe focus is unreliable.
      window.addEventListener('keydown', (e) => {
        if (!player.classList.contains('show')) return;
        if (e.altKey || e.ctrlKey || e.metaKey) return;

        const handled = /^[0-9]$/.test(e.key)
          || /^Numpad[0-9]$/.test(e.code)
          || e.key === 'Backspace'
          || e.key === 'Delete'
          || e.key === 'Enter'
          || e.code === 'NumpadEnter'
          || e.key === ' ';

        if (!handled) return;

        try {
          frame.contentWindow?.postMessage({
            type: 'beans-key',
            key: e.key,
            code: e.code
          }, window.location.origin);
        } catch {}

        e.preventDefault();
        showNav(1200);
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(console.error);
        });
      }

      renderGames();
      initFromUrl();
    </script>
  </body>
</html>
