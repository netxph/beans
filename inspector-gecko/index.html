        // --- SOUND SYNTHESIS USING WEB AUDIO API ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;

        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, idx) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = audioCtx.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'sine';
                    noteOsc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    noteGain.gain.setValueAtTime(0.1, now + idx * 0.08);
                    noteGain.gain.linearRampToValueAtTime(0.01, now + idx * 0.08 + 0.15);
                    noteOsc.start(now + idx * 0.08);
                    noteOsc.stop(now + idx * 0.08 + 0.2);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.35);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'unlock') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'fanfare') {
                const chords = [392.00, 493.88, 587.33, 783.99];
                chords.forEach((freq, idx) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = audioCtx.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'triangle';
                    noteOsc.frequency.setValueAtTime(freq, now);
                    noteOsc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.8);
                    noteGain.gain.setValueAtTime(0.06, now);
                    noteGain.gain.linearRampToValueAtTime(0.001, now + 1.2);
                    noteOsc.start(now);
                    noteOsc.stop(now + 1.2);
                });
            }
        }

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height - 20;
                this.size = Math.random() * 8 + 6;
                this.color = `hsl(${Math.random() * 360}, 90%, 65%)`;
                this.speedY = Math.random() * 3 + 4;
                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function spawnConfetti() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new ConfettiParticle());
            }
            if (!animationFrameId) {
                runConfettiLoop();
            }
        }

        function runConfettiLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach((p) => {
                p.update();
                p.draw();
                if (p.y < canvas.height) active = true;
            });
            if (active) {
                animationFrameId = requestAnimationFrame(runConfettiLoop);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // --- WIKIPEDIA API FETCH ---
        async function fetchWikipediaData(personName) {
            const encodedTitle = encodeURIComponent(personName);
            // Wikipedia opensearch or query with intro text & standard medium thumbnail
            const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts|pageimages&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=400&titles=${encodedTitle}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const pages = data.query?.pages;
                if (!pages) return null;
                const pageId = Object.keys(pages)[0];
                if (pageId === "-1") return null;
                
                const rawExtract = pages[pageId].extract || "";
                // Keep more intro sentences so post-answer reading feels richer.
                const sentences = rawExtract.match(/[^.!?]+[.!?]+/g) || [rawExtract];
                const simplifiedExtract = sentences.slice(0, 6).join(" ");
                
                const thumbnail = pages[pageId].thumbnail?.source || null;
                return {
                    summary: simplifiedExtract,
                    image: thumbnail
                };
            } catch (err) {
                console.error("Wikipedia fetch failed: ", err);
                return null;
            }
        }

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function withArticle(text) {
            return /^[aeiou]/i.test(text.trim()) ? `an ${text}` : `a ${text}`;
        }

        function splitSentences(text) {
            const clean = (text || '').replace(/\s+/g, ' ').trim();
            if (!clean) return [];

            const rough = clean.match(/[^.!?]+[.!?]+/g) || [clean];
            const merged = [];
            let carry = '';

            for (const part of rough) {
                let s = part.trim();
                if (!s) continue;

                if (carry) {
                    s = `${carry} ${s}`.replace(/\s+/g, ' ').trim();
                    carry = '';
                }

                const tooShort = s.length < 30;
                const mostlySymbols = !/[A-Za-z]{3,}/.test(s);
                const danglingDate = /\b(c\.|ca\.|circa)\s*$/i.test(s);

                if (tooShort || mostlySymbols || danglingDate) {
                    carry = s;
                    continue;
                }

                merged.push(s);
            }

            if (carry && merged.length) {
                merged[merged.length - 1] = `${merged[merged.length - 1]} ${carry}`.replace(/\s+/g, ' ').trim();
            } else if (carry) {
                merged.push(carry);
            }

            return merged;
        }

        function escapeRegExp(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function detectPronoun(text = '') {
            const lower = text.toLowerCase();
            const heCount = (lower.match(/\b(he|him|his)\b/g) || []).length;
            const sheCount = (lower.match(/\b(she|her|hers)\b/g) || []).length;
            if (sheCount > heCount) return 'she';
            if (heCount > sheCount) return 'he';
            return 'they'; // ponytail: neutral fallback when Wikipedia intro is ambiguous.
        }

        function pronounForms(base = 'they') {
            if (base === 'she') return { subject: 'she', possessive: 'her' };
            if (base === 'he') return { subject: 'he', possessive: 'his' };
            return { subject: 'they', possessive: 'their' };
        }

        function redactName(text, name, pronoun = 'they') {
            if (!text || !name) return text;

            const cleanName = name.replace(/\s*\(.*?\)\s*/g, ' ').replace(/\s+/g, ' ').trim();
            const noSuffix = cleanName.replace(/\s+(Jr\.?|Sr\.?|II|III|IV)$/i, '').trim();
            const parts = noSuffix.split(/\s+/).filter(Boolean);
            const lastName = parts.length > 1 ? parts[parts.length - 1] : '';

            const variants = [name, cleanName, noSuffix, lastName]
                .filter(v => v && v.length > 2);

            const forms = pronounForms(pronoun);
            let out = text;

            for (const variant of [...new Set(variants)]) {
                const possessiveRe = new RegExp(`\\b${escapeRegExp(variant)}(?:'s|’s)`, 'gi');
                out = out.replace(possessiveRe, forms.possessive);

                const plainRe = new RegExp(`\\b${escapeRegExp(variant)}\\b`, 'gi');
                out = out.replace(plainRe, forms.subject);
            }
            return out;
        }

        function buildQuizFromSeed(seed, wikiData = null) {
            const wikiSummary = wikiData?.summary || '';
            const wikiSentences = splitSentences(wikiSummary);
            const pronoun = detectPronoun(wikiSummary);
            const clueSentences = wikiSentences
                .map(s => redactName(s, seed.name, pronoun))
                .filter(s => s && s.length >= 35 && /[A-Za-z]{4,}/.test(s));

            const clue1 = clueSentences[3] || clueSentences[2] || `I worked on ideas linked to ${seed.known_for}.`;
            const clue2 = clueSentences[1] || `I am known for ${seed.known_for}.`;
            const clue3 = clueSentences[0] || `People remember me for ${seed.known_for}.`;

            const primaryBio = wikiSentences.slice(0, 2).join(' ');
            const extraWiki = wikiSentences.slice(2, 6).join(' ');

            const readMore = [
                `${seed.name} is best known for ${seed.known_for}.`,
                primaryBio
            ].join(' ').trim();

            const trivia = wikiSentences[4]
                || wikiSentences[3]
                || `Fun fact: ${seed.name} is known for ${seed.known_for}.`;

            return {
                id: seed.id,
                name: seed.name,
                category: seed.category,
                clues: [clue1, clue2, clue3].map(s => s.length > 180 ? `${s.slice(0, 179).trim()}…` : s),
                famousFor: readMore,
                trivia,
                wikiSummary: extraWiki || primaryBio,
                wikiImage: wikiData?.image || null
            };
        }

        async function loadPeopleSeed() {
            if (peopleSeedCache) return peopleSeedCache;

            try {
                const res = await fetch(PEOPLE_SEED_URL);
                if (!res.ok) return [];
                const data = await res.json();
                // ponytail: keep only bare fields game needs.
                peopleSeedCache = (Array.isArray(data) ? data : []).map(p => ({
                    id: p.id,
                    name: p.name,
                    category: p.category,
                    known_for: p.known_for
                }));
                return peopleSeedCache;
            } catch {
                return [];
            }
        }

        function pickCategoryBalancedCases(cases, targetCount = 5) {
            const byCategory = new Map();
            for (const quiz of shuffle(cases)) {
                const cat = quiz.category || 'Historical Figure';
                if (!byCategory.has(cat)) byCategory.set(cat, []);
                byCategory.get(cat).push(quiz);
            }

            const result = [];
            let categoryOrder = shuffle([...byCategory.keys()]);

            while (result.length < targetCount) {
                let addedAny = false;

                for (const cat of categoryOrder) {
                    const bucket = byCategory.get(cat);
                    if (!bucket || !bucket.length) continue;

                    result.push(bucket.pop());
                    addedAny = true;
                    if (result.length >= targetCount) break;
                }

                if (!addedAny) break;
                categoryOrder = shuffle(categoryOrder); // ponytail: cheap rotation for fresher category order.
            }

            return result;
        }

        async function fetchFamousPeopleCases(targetCount = 5) {
            const pool = await loadPeopleSeed();
            if (!pool.length) return [];

            const picks = shuffle(pool).slice(0, targetCount);
            const wikiDataList = await Promise.all(picks.map(p => fetchWikipediaData(p.name)));
            const cases = picks.map((p, i) => buildQuizFromSeed(p, wikiDataList[i]));

            return pickCategoryBalancedCases(cases, targetCount);
        }

        function getRoundOptions(quiz) {
            const poolDecoys = shuffle(
                selectedQuizzes
                    .filter(q => q.name !== quiz.name)
                    .map(q => q.name)
            ).slice(0, 3);

            const fallbackDecoys = Array.isArray(quiz.decoys) ? quiz.decoys : [];
            const decoys = [...new Set([...poolDecoys, ...fallbackDecoys])].slice(0, 3);
            return shuffle([quiz.name, ...decoys]);
        }

        async function initGame() {
            playSound('click');
            currentQuizIndex = 0;
            score = 0;

            const card = document.getElementById('game-card');
            card.innerHTML = `
                <div class="text-center py-12">
                    <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                        <div class="absolute inset-0 border-4 border-dashed border-emerald-500 rounded-full animate-spin"></div>
                        <span class="text-4xl">🕵️‍♂️</span>
                    </div>
                    <h3 class="text-2xl font-bold text-emerald-800">Picking random people from the Gecko list...</h3>
                    <p class="text-slate-500 font-medium mt-2">Inspector Gecko is enriching each case with Wikipedia facts.</p>
                </div>
            `;

            const randomCases = await fetchFamousPeopleCases(5);
            if (randomCases.length >= 5) {
                selectedQuizzes = randomCases.slice(0, 5);
            } else {
                const fallback = shuffle(CASE_REGISTRY).slice(0, 5 - randomCases.length);
                selectedQuizzes = [...randomCases, ...fallback];
            }

            startRound();
        }

        function updateTopBar() {
            document.getElementById('top-progress').innerText = `Case ${currentQuizIndex + 1} / 5`;
        }

        function startRound() {
            if (currentQuizIndex >= 5) {
                showGraduationScreen();
                return;
            }
            updateTopBar();

            cluesOpened = [true, false, false]; 
            hasGuessedThisRound = false;
            pointsEarnedThisRound = 10; 

            renderRoundScreen();
        }

        function renderRoundScreen() {
            const quiz = selectedQuizzes[currentQuizIndex];
            const card = document.getElementById('game-card');

            // Shuffle options
            const options = getRoundOptions(quiz);

            let html = `
                <!-- Screen Header -->
                <div class="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6">
                    <span class="bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-full border border-yellow-300 text-sm tracking-wide flex items-center">
                        <span class="mr-1">🔎</span> Mystery File
                    </span>
                    <span class="text-slate-500 font-semibold text-sm">Category: ${quiz.category || 'Secret'}</span>
                </div>

                <!-- Inspector Gecko & Sleuthing Board -->
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-center">
                    
                    <!-- Left Mascot -->
                    <div class="md:col-span-4 text-center">
                        ${GECKO_SVG}
                        <p class="text-emerald-800 font-bold text-sm mt-2 italic">"Find the clues, detective!"</p>
                    </div>

                    <!-- Right Clue Board -->
                    <div class="md:col-span-8 space-y-4">
                        <h3 class="text-2xl font-bold text-slate-800 flex items-center">
                            <span class="bg-emerald-100 p-1.5 rounded-lg mr-2">👣</span> Case Evidence:
                        </h3>
                        
                        <!-- Clue 1 (Always Open) -->
                        <div class="bg-yellow-50 border-2 border-slate-700 p-4 rounded-2xl relative shadow-sm">
                            <span class="absolute -top-3 left-4 bg-slate-800 text-white text-xs px-2.5 py-0.5 rounded-full font-bold">Clue #1</span>
                            <p class="text-lg font-medium text-slate-700 mt-1">${quiz.clues[0]}</p>
                        </div>

                        <!-- Clue 2 -->
                        <div id="clue-2-box">
                            ${renderClueBox(1, quiz.clues[1])}
                        </div>

                        <!-- Clue 3 -->
                        <div id="clue-3-box">
                            ${renderClueBox(2, quiz.clues[2])}
                        </div>
                    </div>

                </div>

                <!-- Selection Buttons -->
                <div class="mt-8">
                    <h4 class="text-center font-bold text-slate-500 mb-4 tracking-wider uppercase text-xs">Tap a name to make an arrest!</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${options.map(opt => `
                            <button 
                                onclick="handleGuess('${opt.replace(/'/g, "\\'")}', this)"
                                class="btn-option bg-sky-50 hover:bg-sky-100 text-sky-900 border-2 border-sky-200 hover:border-sky-400 py-4 px-6 rounded-2xl font-bold text-lg text-left transition transform active:scale-95 shadow-sm flex items-center justify-between"
                            >
                                <span>👤 &nbsp; ${opt}</span>
                                <span class="text-2xl opacity-0 transition-opacity duration-200">🔍</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;

            card.innerHTML = html;
        }

        function renderClueBox(index, text) {
            if (cluesOpened[index]) {
                return `
                    <div class="bg-yellow-50 border-2 border-slate-700 p-4 rounded-2xl relative shadow-sm">
                        <span class="absolute -top-3 left-4 bg-slate-800 text-white text-xs px-2.5 py-0.5 rounded-full font-bold">Clue #${index + 1}</span>
                        <p class="text-lg font-medium text-slate-700 mt-1">${text}</p>
                    </div>
                `;
            } else {
                return `
                    <button 
                        onclick="unlockClue(${index})"
                        class="w-full bg-emerald-100 hover:bg-emerald-200 text-emerald-800 border-2 border-dashed border-emerald-400 p-4 rounded-2xl flex items-center justify-center space-x-3 transition active:scale-[0.99]"
                    >
                        <span class="text-2xl">🔍</span>
                        <span class="font-bold text-lg">Inspect Clue #${index + 1}</span>
                    </button>
                `;
            }
        }

        function unlockClue(index) {
            cluesOpened[index] = true;
            playSound('unlock');
            pointsEarnedThisRound = Math.max(pointsEarnedThisRound - 2, 5);
            renderRoundScreen();
        }

        function handleGuess(selectedName, btnElement) {
            if (hasGuessedThisRound) return;

            const quiz = selectedQuizzes[currentQuizIndex];

            if (selectedName === quiz.name) {
                playSound('correct');
                score += pointsEarnedThisRound;
                spawnConfetti();

                // Style Correct Button
                btnElement.classList.replace('bg-sky-50', 'bg-green-100');
                btnElement.classList.replace('border-sky-200', 'border-green-600');
                btnElement.classList.add('text-green-900', 'border-4');
                btnElement.querySelector('span:last-child').innerHTML = '✅';
                btnElement.querySelector('span:last-child').classList.replace('opacity-0', 'opacity-100');

                hasGuessedThisRound = true;

                // Load Wikipedia Data & Reveal Screen
                setTimeout(() => {
                    renderWikipediaReveal(quiz, true);
                }, 1000);

            } else {
                playSound('wrong');
                btnElement.classList.add('shake-element');
                setTimeout(() => btnElement.classList.remove('shake-element'), 600);

                btnElement.classList.replace('bg-sky-50', 'bg-red-50');
                btnElement.classList.replace('border-sky-200', 'border-red-400');
                btnElement.classList.add('text-red-700');
                btnElement.querySelector('span:last-child').innerHTML = '❌';
                btnElement.querySelector('span:last-child').classList.replace('opacity-0', 'opacity-100');

                pointsEarnedThisRound = Math.max(pointsEarnedThisRound - 3, 2);

                // Auto open locked clues
                let openedNewClue = false;
                for (let i = 1; i <= 2; i++) {
                    if (!cluesOpened[i]) {
                        cluesOpened[i] = true;
                        openedNewClue = true;
                        break;
                    }
                }
                if (openedNewClue) {
                    setTimeout(() => {
                        showNotification("Clue Discovered!", "Inspector Gecko searched again and found another clue!", "🕵️‍♂️");
                        renderRoundScreen();
                    }, 800);
                }
            }
        }

        // --- FULL PAGE WIKIPEDIA REVEAL SCREEN ---
        async function renderWikipediaReveal(quiz, wasCorrect) {
            const card = document.getElementById('game-card');

            // Show Wikipedia fetching loader
            card.innerHTML = `
                <div class="text-center py-12">
                    <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                        <div class="absolute inset-0 border-4 border-dashed border-emerald-500 rounded-full animate-spin"></div>
                        <span class="text-4xl">📚</span>
                    </div>
                    <h3 class="text-2xl font-bold text-emerald-800">Opening Wikipedia Files...</h3>
                    <p class="text-slate-500 font-medium mt-2">Inspector Gecko is fetching official photo and files!</p>
                </div>
            `;

            // Live Fetch (or reuse cached data from random-case generation)
            const wikiData = (quiz.wikiSummary || quiz.wikiImage)
                ? { summary: quiz.wikiSummary || '', image: quiz.wikiImage || null }
                : await fetchWikipediaData(quiz.name);

            let bannerColor = wasCorrect ? 'bg-green-500' : 'bg-amber-500';
            let statusTitle = wasCorrect ? 'Case Solved!' : 'Case Investigation Complete!';
            let subTitle = wasCorrect ? 'Outstanding Detective Work!' : 'Discover historical facts below!';

            // Choose either wiki image or cute category icon as fallback
            let imageSectionHTML = '';
            if (wikiData && wikiData.image) {
                imageSectionHTML = `
                    <div class="relative inline-block mt-4">
                        <img 
                            src="${wikiData.image}" 
                            alt="${quiz.name}" 
                            class="w-44 h-44 object-cover rounded-3xl border-4 border-slate-800 shadow-[4px_4px_0px_0px_rgba(30,41,59,1)]"
                        />
                        <span class="absolute -bottom-2 -right-2 bg-yellow-300 p-2 rounded-full border-2 border-slate-800 text-xl shadow">
                            📷
                        </span>
                    </div>
                `;
            } else {
                imageSectionHTML = `
                    <div class="p-6 bg-slate-100 border-4 border-slate-800 rounded-full shadow-inner mt-4 inline-flex">
                        ${getCategoryIcon(quiz.category)}
                    </div>
                `;
            }

            // Create a backup descriptive summary if Wikipedia failed to return an intro
            let wikiExtractHTML = '';
            if (wikiData && wikiData.summary) {
                wikiExtractHTML = `
                    <div class="bg-slate-50 border-2 border-slate-700 p-4 rounded-2xl">
                        <h5 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Wikipedia Encyclopedia Entry</h5>
                        <p class="text-slate-700 font-medium text-base leading-relaxed italic">
                            "${wikiData.summary}"
                        </p>
                    </div>
                `;
            }

            card.innerHTML = `
                <!-- Top Header Banner -->
                <div class="${bannerColor} text-white -mx-6 md:-mx-8 -mt-6 md:-mt-8 p-6 text-center rounded-t-2xl border-b-4 border-black/10 relative">
                    <span class="absolute top-4 left-4 text-3xl">🗂️</span>
                    <h2 class="text-3xl font-extrabold tracking-wider">${statusTitle}</h2>
                    <p class="text-emerald-50 text-sm font-semibold">${subTitle}</p>
                </div>

                <!-- Picture and Name Frame -->
                <div class="flex flex-col items-center mt-6">
                    ${imageSectionHTML}
                    
                    <span class="bg-slate-800 text-white font-bold px-4 py-1 rounded-full text-xs uppercase tracking-widest shadow-md mt-4">
                        ${quiz.category || 'Historical Figure'}
                    </span>
                    <h3 class="text-4xl font-extrabold text-slate-800 text-center mt-2 tracking-wide">
                        ${quiz.name}
                    </h3>
                </div>

                <!-- Dynamic Content Sections -->
                <div class="mt-6 space-y-4">
                    
                    <!-- What makes them famous -->
                    <div class="bg-sky-50 border-l-8 border-sky-400 p-4 rounded-r-2xl shadow-sm">
                        <h4 class="text-sky-900 font-extrabold text-lg flex items-center mb-1">
                            ⭐ &nbsp; Why are they Famous?
                        </h4>
                        <p class="text-sky-800 font-medium text-lg leading-relaxed">
                            ${quiz.famousFor}
                        </p>
                    </div>

                    <!-- Live Wikipedia Summary (If loaded successfully) -->
                    ${wikiExtractHTML}

                    <!-- Fun Kid Trivia -->
                    <div class="bg-amber-50 border-l-8 border-amber-400 p-4 rounded-r-2xl shadow-sm">
                        <h4 class="text-amber-900 font-extrabold text-lg flex items-center mb-1">
                            🧠 &nbsp; Mind-Blowing Trivia!
                        </h4>
                        <p class="text-amber-800 font-medium text-base leading-relaxed">

                        </p>
                    </div>

                <!-- Action Button -->

        function advanceCase() {
            playSound('click');
            currentQuizIndex++;
            startRound();

            spawnConfetti();

            const card = document.getElementById('game-card');

            let badgeTitle = "";

            let badgeColor = "";
            let description = "";

            if (score >= 45) {
                badgeTitle = "Chief Golden Lizard";
                badgeIcon = "🏆";
                badgeColor = "from-yellow-400 to-amber-500 text-yellow-950";
                description = "Master sleuth! Your deduction skills are unparalleled. You found every single historical trail perfectly!";
            } else if (score >= 30) {
                badgeTitle = "Super Sleuth Silver";
                badgeIcon = "🥈";
                badgeColor = "from-slate-200 to-slate-400 text-slate-900";
                description = "Excellent detective work! You cracked the cases quickly and with smart connections!";
            } else {
                badgeTitle = "Junior Detective Bronze";
                badgeIcon = "🥉";
                badgeColor = "from-amber-600 to-amber-800 text-amber-50";
                description = "Well done! You researched deeply and graduated with honors from Inspector Gecko's Academy!";

            card.innerHTML = `
